name: Build and Publish Extension

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  NODE_VERSION: 20

jobs:
  build-package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: npm ci
      - run: npm run compile
      - name: Package VSIX
        id: package
        run: npx vsce package -o extension.vsix && echo "vsix=extension.vsix" >> $GITHUB_OUTPUT
      - uses: actions/upload-artifact@v4
        with:
          name: extension-vsix
          path: extension.vsix

  release:
    needs: build-package
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: extension-vsix
          path: .
      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ github.sha }}
          release_name: Release ${{ github.sha }}
          draft: false
          prerelease: false
      - name: Upload VSIX to Release
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./extension.vsix
          asset_name: extension.vsix
          asset_content_type: application/octet-stream

  publish-marketplaces:
    needs: release
    runs-on: ubuntu-latest
    environment: publish
    steps:
      - uses: actions/checkout@v4
      - run: npm ci
      - run: npm run compile
      - name: Publish to Visual Studio Marketplace (requires VSCE_TOKEN secret)
        env:
          VSCE_TOKEN: ${{ secrets.VSCE_TOKEN }}
        run: |
          if [ -n "$VSCE_TOKEN" ]; then
            npm i -g @vscode/vsce || npm i -g vsce || true
            set +e
            out=$(npx @vscode/vsce publish --pat "$VSCE_TOKEN" 2>&1) || rc=$?
            set -e
            echo "$out"
            if [ "${rc:-0}" -ne 0 ]; then
              if echo "$out" | grep -qi "already exists"; then
                echo "VSCE: version already exists; bumping patch version and retrying publish."
                # Bump patch version locally (no git tag) and retry publish
                npm version patch --no-git-tag-version
                set +e
                out2=$(npx @vscode/vsce publish --pat "$VSCE_TOKEN" 2>&1) || rc2=$?
                set -e
                echo "$out2"
                if [ "${rc2:-0}" -ne 0 ]; then
                  echo "VSCE publish failed after bump; check VSCE_TOKEN and publisher settings."
                  exit 1
                else
                  echo "VSCE publish succeeded after version bump."
                fi
              else
                echo "VSCE publish failed; check VSCE_TOKEN and publisher settings."
                exit 1
              fi
            else
              echo "VSCE publish succeeded."
            fi
          else
            echo "Skipping VSCE publish: VSCE_TOKEN not set"
          fi

      - name: Publish to Open VSX (requires OPEN_VSX_TOKEN secret)
        env:
          OPEN_VSX_TOKEN: ${{ secrets.OPEN_VSX_TOKEN }}
        run: |
          if [ -n "$OPEN_VSX_TOKEN" ]; then
            npm i -g ovsx@latest || true
            echo "ovsx version: $(ovsx --version 2>&1 || true)"
            set +e
            out=$(ovsx publish --token "$OPEN_VSX_TOKEN" 2>&1) || rc=$?
            if [ "${rc:-0}" -ne 0 ]; then
              # Try alternate flag --pat
              out2=$(ovsx publish --pat "$OPEN_VSX_TOKEN" 2>&1) || rc2=$?
              if [ "${rc2:-0}" -ne 0 ]; then
                # Try plain publish (some ovsx versions read token from env or config)
                out3=$(ovsx publish 2>&1) || rc3=$?
                echo "---- --token output ----"
                echo "$out"
                echo "---- --pat output ----"
                echo "$out2"
                echo "---- plain publish output ----"
                echo "$out3"
                echo "Open VSX publish failed; check OPEN_VSX_TOKEN and ovsx usage."
                exit 1
              else
                echo "$out2"
                echo "Open VSX publish succeeded with --pat."
              fi
            else
              echo "$out"
              echo "Open VSX publish succeeded with --token."
            fi
            set -e
          else
            echo "Skipping Open VSX publish: OPEN_VSX_TOKEN not set"
          fi
